<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabi Smart Cam Studio Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 15px; color: #00adb5; }
        .media-container {
            width: 100%;
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { display: none; } 
        canvas {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            background: #000;
        }
        .recording-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 10;
        }
        .controls-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-primary { background: #00adb5; color: white; }
        .btn-secondary { background: #393e46; color: #eeeeee; }
        .btn-success { background: #4caf50; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-main { width: 100%; font-size: 16px; padding: 12px; display: none; }
        
        .adjustments-panel {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
        }
        .adjustments-panel h3 { font-size: 13px; color: #00adb5; margin-bottom: 8px; }
        .control-group { display: flex; align-items: center; margin-bottom: 8px; }
        .control-group label { width: 85px; font-size: 12px; color: #ccc; }
        .control-group input[type="range"] { flex: 1; accent-color: #00adb5; }
        .control-group span { width: 35px; text-align: right; font-size: 11px; color: #aaa; margin-left: 5px; }

        .filters-section { text-align: left; margin-bottom: 15px; }
        .filters-carousel { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .filter-btn {
            flex: 0 0 auto; padding: 6px 12px; background: #2d2d2d;
            border: 2px solid transparent; color: #fff; border-radius: 15px; font-size: 12px;
        }
        .filter-btn.active { background: #00adb5; border-color: #fff; }

        .gallery-section { margin-top: 20px; text-align: left; }
        .gallery-section h2 { font-size: 15px; margin-bottom: 10px; border-left: 4px solid #00adb5; padding-left: 6px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 150px; overflow-y: auto; }
        .gallery-item { position: relative; width: 100%; height: 80px; background: #000; border-radius: 6px; overflow: hidden; }
        .gallery-item img, .gallery-item video { width: 100%; height: 100%; object-fit: cover; }
        .v-icon { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); color: red; font-size: 9px; padding: 1px 3px; border-radius: 3px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="container">
        <h1>Gabi's Smart Cam Studio</h1>
        
        <div class="controls-row">
            <button class="btn btn-primary" id="btn-start">📹 Pornire Cameră</button>
            <button class="btn btn-secondary" id="btn-switch">🔄 Schimbă Camera</button>
            <label class="btn btn-secondary">
                <input type="file" id="file-input" accept="image/*">📁 Încarcă Foto
            </label>
        </div>

        <div class="media-container">
            <div id="rec-badge" class="recording-badge">● LIVE RECORD</div>
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls-row">
            <button class="btn btn-success" id="btn-snap">📸 Fă Poză</button>
            <button class="btn btn-danger" id="btn-record">🔴 Filmează Video</button>
            <button class="btn btn-secondary" id="btn-stop-vid" style="display:none;">⏹️ Oprește & Salvează</button>
            <button class="btn btn-secondary" id="btn-back" style="display: none;">↩️ Înapoi la Live</button>
        </div>

        <div class="adjustments-panel">
            <h3>Ajustări Live (Garanție Mobil)</h3>
            <div class="control-group"><label>Luminozitate</label><input type="range" id="s-brightness" min="50" max="200" value="100"><span id="v-brightness">100%</span></div>
            <div class="control-group"><label>Contrast</label><input type="range" id="s-contrast" min="50" max="200" value="100"><span id="v-contrast">100%</span></div>
            <div class="control-group"><label>Saturație</label><input type="range" id="s-saturation" min="0" max="200" value="100"><span id="v-saturation">100%</span></div>
        </div>

        <div class="filters-section">
            <div class="filters-carousel">
                <button class="filter-btn active" data-filter="none">Original</button>
                <button class="filter-btn" data-filter="grayscale(100%)">Alb-Negru</button>
                <button class="filter-btn" data-filter="sepia(100%)">Sepia</button>
                <button class="filter-btn" data-filter="invert(100%)">Negativ</button>
                <button class="filter-btn" data-filter="hue-rotate(90deg)">Cyberpunk</button>
            </div>
        </div>

        <button class="btn btn-success btn-main" id="btn-save-img">💾 SALVEAZĂ POZA ÎN TELEFON</button>

        <div class="gallery-section">
            <h2>Galeria Aplicației</h2>
            <div id="gallery-grid" class="gallery-grid">
                <span style="color:#555; font-size:12px; font-style:italic;">Nicio poză salvată încă.</span>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const btnStart = document.getElementById('btn-start');
        const btnSwitch = document.getElementById('btn-switch');
        const btnSnap = document.getElementById('btn-snap');
        const btnRecord = document.getElementById('btn-record');
        const btnStopVid = document.getElementById('btn-stop-vid');
        const btnBack = document.getElementById('btn-back');
        const btnSaveImg = document.getElementById('btn-save-img');
        const fileInput = document.getElementById('file-input');
        const galleryGrid = document.getElementById('gallery-grid');
        const recBadge = document.getElementById('rec-badge');

        let stream = null, mediaRecorder = null, recordedChunks = [];
        let originalImage = new Image(), currentFacingMode = "environment";
        let selectedPreset = "none", isStatic = false, db = null;
        let animationFrameId = null;

        const req = indexedDB.open('GabiSmartCamDB', 2);
        req.onupgradeneeded = (e) => { e.target.result.createObjectStore('media', { autoIncrement: true }); };
        req.onsuccess = (e) => { db = e.target.result; renderGallery(); };

        async function startCamera() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false 
                });
                video.srcObject = stream;
                video.play();
                
                isStatic = false;
                btnSnap.style.display = 'inline-block';
                btnRecord.style.display = 'inline-block';
                btnBack.style.display = 'none';
                btnSaveImg.style.display = 'none';

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    drawLiveCanvas();
                };
            } catch (err) {
                alert("Permiteți accesul la cameră.");
            }
        }

        function drawLiveCanvas() {
            if (isStatic) return;
            
            const b = document.getElementById('s-brightness').value;
            const c = document.getElementById('s-contrast').value;
            const s = document.getElementById('s-saturation').value;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = `${selectedPreset === 'none' ? '' : selectedPreset} brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            animationFrameId = requestAnimationFrame(drawLiveCanvas);
        }

        function applyStaticFilters() {
            if (!isStatic || !originalImage.src) return;
            const b = document.getElementById('s-brightness').value;
            const c = document.getElementById('s-contrast').value;
            const s = document.getElementById('s-saturation').value;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = `${selectedPreset === 'none' ? '' : selectedPreset} brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        }

        ['s-brightness', 's-contrast', 's-saturation'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const tip = id.split('-')[1];
                document.getElementById(`v-${tip}`).innerText = e.target.value + '%';
                if (isStatic) applyStaticFilters();
            });
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedPreset = e.target.getAttribute('data-filter');
                if (isStatic) applyStaticFilters();
            });
        });

        btnStart.addEventListener('click', startCamera);
        btnSwitch.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            if(stream) startCamera();
        });

        btnSnap.addEventListener('click', () => {
            if (!stream) return;
            isStatic = true;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            originalImage.src = canvas.toDataURL('image/png');
            originalImage.onload = () => {
                btnSnap.style.display = 'none';
                btnRecord.style.display = 'none';
                btnBack.style.display = 'inline-block';
                btnSaveImg.style.display = 'block';
                applyStaticFilters();
            };
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            isStatic = true;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            
            const r = new FileReader();
            r.onload = (ev) => {
                originalImage.onload = () => {
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    btnSnap.style.display = 'none';
                    btnRecord.style.display = 'none';
                    btnBack.style.display = 'inline-block';
                    btnSaveImg.style.display = 'block';
                    applyStaticFilters();
                };
                originalImage.src = ev.target.result;
            };
            r.readAsDataURL(file);
        });

        btnBack.addEventListener('click', startCamera);

        btnSaveImg.addEventListener('click', () => {
            if(!isStatic) return;
            const data = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.download = `GabiPro_${Date.now()}.png`;
            a.href = data;
            a.click();
            saveMedia({ type: 'image', src: data });
        });

        btnRecord.addEventListener('click', () => {
            if (!stream) return;
            recordedChunks = [];
            const canvasStream = canvas.captureStream(30);
            
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/mp4' };

            try { mediaRecorder = new MediaRecorder(canvasStream, options); } 
            catch(e) { mediaRecorder = new MediaRecorder(canvasStream); }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `GabiVidPro_${Date.now()}.mp4`;
                a.href = url;
                a.click();
                
                const r = new FileReader();
                r.readAsDataURL(blob);
                r.onloadend = () => { saveMedia({ type: 'video', src: r.result }); };
            };

            mediaRecorder.start();
            recBadge.style.display = 'block';
            btnRecord.style.display = 'none';
            btnStopVid.style.display = 'inline-block';
        });

        btnStopVid.addEventListener('click', () => {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                recBadge.style.display = 'none';
                btnRecord.style.display = 'inline-block';
                btnStopVid.style.display = 'none';
                startCamera();
            }
        });

        function saveMedia(item) {
            if(!db) return;
            const tx = db.transaction(['media'], 'readwrite');
            tx.objectStore('media').add(item);
            tx.oncomplete = renderGallery;
        }

        function renderGallery() {
            if(!db) return;
            const store = db.transaction(['media'], 'readonly').objectStore('media');
            store.getAll().onsuccess = (e) => {
                galleryGrid.innerHTML = '';
                const items = e.target.result;
                if(items.length === 0) {
                    galleryGrid.innerHTML = '<span style="color:#555; font-size:12px; font-style:italic;">Nicio poză salvată încă.</span>';
                    return;
                }
                items.reverse().forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'gallery-item';
                    if(item.type === 'image') {
                        const img = document.createElement('img'); img.src = item.src; el.appendChild(img);
                    } else {
                        const vid = document.createElement('video'); vid.src = item.src; vid.controls = true; el.appendChild(vid);
                        const icon = document.createElement('div'); icon.className = 'v-icon'; icon.innerText = 'VIDEO'; el.appendChild(icon);
                    }
                    galleryGrid.appendChild(el);
                });
            };
        }
    </script>
</body>
</html>
